name: ci

on:
  push:
  pull_request:

jobs:
  build-check:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build package
        run: |
          python -m pip install --upgrade pip
          python -m pip install build
          python -m build

  unit-tests:
    needs: build-check
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install .[dev]
      - name: Run unit tests
        run: pytest -q

  e2e-tests:
    needs: unit-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build e2e image
        run: docker build -f Dockerfile.e2e -t signfetch-e2e .
      - name: Run scenario-1
        run: docker run --rm -e E2E_SCENARIO=scenario-1 signfetch-e2e
      - name: Run scenario-2
        run: docker run --rm -e E2E_SCENARIO=scenario-2 signfetch-e2e

  package-artifact:
    needs: [unit-tests, e2e-tests]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build release package
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine
          python -m build
          python -m twine check dist/*
      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: signfetch-package
          path: dist/*
